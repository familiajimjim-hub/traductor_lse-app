<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor LSE</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #ffffff;
            font-family: sans-serif; position: relative;
        }
        h1 { color: #000; font-size: 2rem; margin-bottom: 20px; }
        #video-viewport { 
            width: 300px; height: 300px; background: #000; border-radius: 20px; 
            overflow: hidden; margin-bottom: 20px; border: 5px solid #eee;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #transcript-area { color: #000; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; min-height: 1.2em; }
        #start-btn {
            background: #004488; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; cursor: pointer; font-size: 1.2rem; font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>TRADUCTOR LSE</h1>
    <div id="video-viewport"><video id="lse-video" playsinline muted></video></div>
    <div id="transcript-area">Toca abajo para hablar</div>
    <button id="start-btn" onclick="startRecognition()">HABLAR AHORA</button>

    <script>
        const videoPlayer = document.getElementById('lse-video');
        const transcriptArea = document.getElementById('transcript-area');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        function startRecognition() {
            if (!SpeechRecognition) return alert("Usa Google Chrome");
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.onstart = () => transcriptArea.innerText = "Escuchando...";
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase().trim();
                transcriptArea.innerText = 'Has dicho: ' + text;
                processText(text);
            };
            recognition.start();
        }

        async function processText(text) {
            const palabrasGrabadas = ["hola", "adios", "gracias"];
            if (palabrasGrabadas.includes(text)) {
                // Ruta corregida a LSE/videos/
                await playVideo(`LSE/videos/${text}.mov`);
            } else {
                const letras = text.replace(/\s/g, "").split("");
                for (let letra of letras) {
                    await playVideo(`LSE/videos/${letra}.mov`);
                }
            }
        }

        function playVideo(src) {
            return new Promise(resolve => {
                videoPlayer.src = src;
                videoPlayer.onended = resolve;
                videoPlayer.onerror = resolve;
                videoPlayer.play().catch(resolve);
            });
        }
    </script>
</body>
</html>
