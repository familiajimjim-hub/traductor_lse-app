<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor LSE</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #ffffff;
            font-family: 'DM Serif Display', serif; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(162,217,255,0.4), transparent 45%),
                        radial-gradient(circle at 90% 90%, rgba(255,194,224,0.4), transparent 45%);
            z-index: -1;
        }
        h1 { color: #1a252f; font-size: 3rem; margin: 10px 0; font-weight: bold; }
        .subtitle { color: #444; font-size: 1.1rem; margin-bottom: 25px; font-style: italic; font-family: sans-serif; }
        #video-viewport { 
            width: 320px; height: 320px; background: #000; border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; 
            margin-bottom: 20px; border: 5px solid #fff;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #transcript-area { 
            color: #1a252f; font-size: 1.4rem; font-weight: bold; font-family: sans-serif;
            margin-bottom: 30px; text-align: center; min-height: 1.5em; width: 85%;
        }
        #main-btn {
            background: #2c3e50; color: white; border: none; padding: 20px 55px;
            border-radius: 50px; cursor: pointer; font-size: 1.2rem; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; font-family: sans-serif;
        }
        #main-btn.recording { background: #e74c3c; }
    </style>
</head>
<body>

    <h1>De Voz a Signos</h1>
    <div class="subtitle">Traductor LSE Personalizado</div>
    
    <div id="video-viewport">
        <video id="lse-video" playsinline muted preload="auto"></video>
    </div>

    <div id="transcript-area">Toca para hablar</div>

    <button id="main-btn" onclick="toggleRecognition()">HABLAR AHORA</button>

    <script>
        const videoPlayer = document.getElementById('lse-video');
        const transcriptArea = document.getElementById('transcript-area');
        const mainBtn = document.getElementById('main-btn');
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        let recognition;
        let isRecording = false;

        function limpiarTexto(texto) {
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.onstart = () => {
                isRecording = true;
                mainBtn.innerText = "DETENER";
                mainBtn.classList.add('recording');
                transcriptArea.innerText = "Escuchando...";
            };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase().trim();
                const limpio = limpiarTexto(text);
                transcriptArea.innerText = '"' + text + '"';
                processText(limpio);
            };
            recognition.onend = () => {
                isRecording = false;
                mainBtn.innerText = "HABLAR AHORA";
                mainBtn.classList.remove('recording');
            };
        }

        function toggleRecognition() {
            if (!recognition) return alert("Usa Chrome");
            isRecording ? recognition.stop() : recognition.start();
        }

        async function processText(text) {
            const palabras = ["hola", "adios", "gracias"];
            if (palabras.includes(text)) {
                await playVideo(`LSE/videos/${text}.mov`);
            } else {
                const letras = text.replace(/\s/g, "").split("");
                for (const letra of letras) {
                    await playVideo(`LSE/videos/${letra}.mov`);
                }
            }
        }

        function playVideo(src) {
            return new Promise((resolve) => {
                videoPlayer.src = src;
                videoPlayer.onended = resolve;
                videoPlayer.onerror = resolve; 
                videoPlayer.play().catch(() => resolve());
            });
        }
    </script>
</body>
</html>
